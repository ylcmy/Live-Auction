services:
  # ─── Web Service: 后端 + 前端静态文件 ───
  - type: web
    name: live-auction
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore
    # 所有环境变量均在 Render Dashboard 中统一管理
    healthCheckPath: /api/health

  # ─── Redis 缓存 ───
  - type: redis
    name: live-auction-redis
    plan: free
    region: singapore
    ipAllowList: []
