name: Keep Render Alive

on:
  schedule:
    # 每 10 分钟 ping 一次，防止 Render 免费层 15 分钟休眠
    - cron: '*/10 * * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -sf --max-time 30 "${{ secrets.RENDER_SERVICE_URL }}/api/health" || exit 0
